<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICPH | PANABO ZONE - Community Feed</title>
    <link rel="icon" href="assets/logo.png" type="image/png">
    <link rel="shortcut icon" href="assets/logo.png" type="image/png">
    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        #reactors-modal,
        .post-extra-modal {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 50000;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .post-extra-card {
            background: #111; border: 1px solid #222; border-radius: 15px; width: 350px; padding: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
        }
        .feeling-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; }
        .feeling-item { padding: 10px; background: rgba(255, 255, 255, 0.03); border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: 0.3s; }
        .feeling-item:hover { background: rgba(255, 255, 255, 0.1); }
        .post-status-tag { font-size: 0.75rem; color: #888; font-weight: normal; margin-left: 5px; }
        #reactors-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); z-index: 50000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .reactors-card { background: #111; border: 1px solid #222; border-radius: 15px; width: 400px; max-height: 500px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 30px rgba(0, 0, 0, 0.5); }
        .reactors-header { padding: 15px 20px; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; font-family: 'Orbitron'; font-size: 0.8rem; letter-spacing: 2px; color: var(--honda-red); }
        .reactors-list { flex: 1; overflow-y: auto; padding: 10px; }
        .reactor-item { display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 10px; cursor: pointer; transition: 0.2s; }
        .reactor-item:hover { background: rgba(255, 255, 255, 0.05); }
        .feed-hero-banner { width: 100%; height: 350px; position: relative; overflow: hidden; border-radius: 20px; margin-bottom: 25px; background: #000; display: flex; align-items: flex-start; justify-content: center; }
        .banner-img { position: absolute; width: 100%; height: 100%; object-fit: cover; object-position: center 20%; opacity: 0.7; }
        .banner-overlay { position: relative; z-index: 2; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0, 0, 0, 0.8) 0%, rgba(0, 0, 0, 0.3) 40%, rgba(0, 0, 0, 0.1) 100%); display: flex; flex-direction: column; align-items: center; padding: 40px 25px; }
        .banner-title { font-family: 'Orbitron'; font-size: 1.4rem; color: white; font-weight: 900; letter-spacing: 4px; margin-bottom: 5px; text-shadow: 0 0 15px rgba(0, 0, 0, 0.8); }
        .banner-subtitle { font-family: 'Orbitron'; font-size: 0.65rem; color: var(--honda-red); letter-spacing: 6px; font-weight: 700; }
        
        /* Story Viewer Centered Controls */
        .story-progress-container { position: absolute; top: 15px; left: 10px; right: 10px; display: flex; gap: 4px; z-index: 100; }
        .story-progress-bar { height: 2px; flex: 1; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
        .story-progress-inner { height: 100%; width: 0%; background: #fff; transition: width linear; }
        .story-progress-inner.viewed { width: 100%; }
        
        .story-video-controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 20px; z-index: 101;
            background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 40px;
            backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1);
        }
        .story-ctrl-btn { color: white; cursor: pointer; font-size: 1.1rem; }
        .volume-slider { width: 80px; accent-color: var(--honda-red); cursor: pointer; }

        .story-nav-btn { position: absolute; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; background: rgba(0,0,0,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; cursor: pointer; z-index: 100; }
        .story-nav-btn:hover { background: rgba(227, 6, 19, 0.8); }

        @keyframes badgePulse {
            0% { transform: scale(1); box-shadow: 0 0 5px rgba(227, 6, 19, 0.5); }
            50% { transform: scale(1.1); box-shadow: 0 0 15px rgba(227, 6, 19, 0.8); }
            100% { transform: scale(1); box-shadow: 0 0 5px rgba(227, 6, 19, 0.5); }
        }
        .story-count-badge { 
            position: absolute; top: 5px; right: 5px; background: var(--honda-red); color: white; 
            font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; font-weight: 900; 
            animation: badgePulse 2s infinite ease-in-out;
        }

        .share-opt { display: flex; align-items: center; gap: 12px; padding: 10px; font-size: 0.8rem; color: #ddd; cursor: pointer; transition: 0.2s; border-radius: 8px; }
        .share-opt:hover { background: rgba(255,255,255,0.05); color: var(--honda-red); }
        @media (max-width: 600px) {
            .feed-hero-banner { height: 200px; } .banner-title { font-size: 1.1rem; }
            .story-v-main { height: 60% !important; flex: none !important; }
            .story-v-sidebar { width: 100% !important; height: 40% !important; border-left: none !important; border-top: 1px solid #1a1a1a !important; position: relative !important; z-index: 1000 !important; }
            .story-v-input { position: sticky !important; bottom: 0 !important; z-index: 1001 !important; background: #0a0a0a !important; }
        }

        .story-v-main .story-progress-container, 
        .story-v-main .story-video-controls, 
        .story-v-main .story-nav-btn, 
        .story-v-main .story-close {
            transition: opacity 0.5s ease;
        }
        .story-v-main.hide-interface .story-progress-container,
        .story-v-main.hide-interface .story-video-controls,
        .story-v-main.hide-interface .story-nav-btn,
        .story-v-main.hide-interface .story-close {
            opacity: 0;
            pointer-events: none;
        }

        .comment-name, .comment-avatar { 
            cursor: pointer; 
            transition: opacity 0.2s ease; 
        }
        .comment-name:hover, .comment-avatar:hover { 
            opacity: 0.7; 
        }
    </style>
</head>

    <script src="app.js"></script>
    <script>
        let allPosts = {}, allRiders = {}, currentStoryId = null, userStoriesGroup = [], currentStoryIndex = 0, storyControlsTimeout;
        let allStoryGroups = []; // List of rider names in order
        let currentGroupIndex = 0; // Index of the current rider in allStoryGroups
        let groupedStories = {}; // To store stories by rider name for navigation
        let selectedFeeling = null, selectedLocation = null;
        const reactionMap = { 'like': '👍', 'love': '❤️', 'haha': '😆', 'wow': '😮', 'sad': '😢', 'angry': '😡' };

        function resetStoryControlsTimer() {
            const main = document.querySelector('.story-v-main');
            if (!main) return;
            main.classList.remove('hide-interface');
            clearTimeout(storyControlsTimeout);
            storyControlsTimeout = setTimeout(() => {
                main.classList.add('hide-interface');
            }, 3000); // Fades out after 3 seconds of inactivity
        }

        function initFeedRealtime() {
            sb.channel('feed-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, async (p) => {
                if (p.eventType === 'INSERT') { const div = document.createElement('div'); document.getElementById('community-feed').prepend(div); await renderPost(p.new, div); }
                else if (p.eventType === 'UPDATE') { allPosts[p.new.id] = p.new; updatePostReactionsUI(p.new); }
                else if (p.eventType === 'DELETE') { document.getElementById(`post-card-${p.old.id}`)?.remove(); }
            }).subscribe();
            sb.channel('stories-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'stories' }, () => loadStories()).subscribe();
            sb.channel('comments-sync').on('postgres_changes', { event: '*', schema: 'public', table: 'post_comments' }, p => { if(p.new) loadPostComments(p.new.post_id); else if(p.old) loadPostComments(p.old.post_id); }).subscribe();
        }

        async function loadFeed() {
            const { data: ps } = await sb.from('posts').select('*').order('created_at', { ascending: false });
            if (!ps) return;
            const names = [...new Set(ps.map(p => p.rider_name))];
            const { data: rs } = await sb.from('riders').select('id, name, avatar_url, rank, is_super_admin').in('name', names);
            if (rs) rs.forEach(r => allRiders[r.name] = r);
            const feed = document.getElementById('community-feed'); feed.innerHTML = '';
            ps.forEach(post => { const div = document.createElement('div'); feed.appendChild(div); renderPost(post, div); });

        async function loadStories() {
            const { data } = await sb.from('stories').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('stories-list-mini'); if(!list) return; list.innerHTML = '';
            
            // Logic Core: Initialize Seen Registry
            const seenStories = JSON.parse(localStorage.getItem('icph_seen_stories') || '[]');
            
            groupedStories = {}; 
            data?.forEach(s => { 
                if(!groupedStories[s.rider_name]) groupedStories[s.rider_name] = []; 
                groupedStories[s.rider_name].push(s); 
            });
            
            allStoryGroups = Object.keys(groupedStories);
            allStoryGroups.forEach(n => {
                const stories = groupedStories[n];
                const unseenStories = stories.filter(s => !seenStories.includes(s.id));
                const latest = stories[0];
                const isV = latest.image_url.match(/\.(mp4|webm|mov)$/i);
                
                // Only show badge if there are unseen stories
                const displayCount = unseenStories.length > 9 ? '9+' : unseenStories.length;

                const div = document.createElement('div'); 
                div.className = `story-card ${!hasUnseen ? 'seen' : ''}`; 
                div.style.minWidth='80px'; 
                div.onclick = () => openUserStories(n, stories);
                
                div.innerHTML = `
                    ${isV ? `<video src="${latest.image_url}"></video>` : `<img src="${latest.image_url}">`}
                    <div class="story-card-overlay">
                        <span>${n}</span>
                        ${hasUnseen ? `<div class="story-count-badge" id="badge-${n}">${displayCount}</div>` : ''}

        function openUserStories(n, s) {

        async function displayCurrentStory() {
            resetStoryControlsTimer();
            const s = userStoriesGroup[currentStoryIndex]; if(!s) return closeStoryViewer();
            
            // Binary Wraith: Global Seen Registry Update
            let seenStories = JSON.parse(localStorage.getItem('icph_seen_stories') || '[]');
            if (!seenStories.includes(s.id)) {
                seenStories.push(s.id);
                localStorage.setItem('icph_seen_stories', JSON.stringify(seenStories));
                
                // Logic Core: Update all badge instances (Mini-Bar & Grid)
                const updateBadge = (riderName) => {
                    const currentUnseen = userStoriesGroup.filter(st => !seenStories.includes(st.id)).length;
                    // Target all potential badge containers for this rider
                    const badges = document.querySelectorAll(`[id^="badge-${riderName}"], .story-count-badge`);
                    badges.forEach(badge => {
                        // Check if this badge belongs to the current rider being viewed
                        const parentCard = badge.closest('.story-card');
                        if (parentCard && parentCard.innerText.includes(riderName)) {
                            if (currentUnseen > 0) {
                                badge.innerText = currentUnseen;
                            } else {
                                badge.remove();
                                parentCard.classList.add('seen');
                            }
                        }
                    });
                };
                updateBadge(s.rider_name);
            }

            document.getElementById('story-viewer-modal').classList.remove('hidden');
            const bars = document.getElementById('story-progress-bars'); bars.innerHTML = '';
            userStoriesGroup.forEach((_, i) => { const b = document.createElement('div'); b.className = 'story-progress-bar'; b.innerHTML = `<div class="story-progress-inner ${i < currentStoryIndex ? 'viewed' : ''}"></div>`; bars.appendChild(b); });
            const isV = s.image_url.match(/\.(mp4|webm|mov)$/i);
            const container = document.getElementById('story-media-container');
            const ctrls = document.getElementById('story-video-ctrls');
            const playBtn = document.getElementById('story-play-btn');
            if (isV) {
                container.innerHTML = `<video src="${s.image_url}" id="story-video" autoplay playsinline style="max-width:100%; max-height:100%;"></video>`;
                ctrls.classList.remove('hidden'); if(playBtn) playBtn.className = 'fas fa-pause story-ctrl-btn';
                document.getElementById('story-video').onended = () => nextStory();
            } else {
                container.innerHTML = `<img src="${s.image_url}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
                ctrls.classList.add('hidden'); setTimeout(() => { if(currentStoryId === s.id) nextStory(); }, 5000);
            }
            
            const canDelete = profile && (profile.name === s.rider_name || profile.is_admin || profile.is_super_admin);
            document.getElementById('story-header-info').innerHTML = `
                <b onclick="stalkRider('${s.rider_name}')" style="cursor:pointer; color:white;">${s.rider_name}</b>
                ${canDelete ? `<i class="fas fa-trash-alt" style="color:#e30613; cursor:pointer; margin-left:15px;" onclick="deleteCurrentStory()"></i>` : ''}
            `;
            currentStoryId = s.id;
            loadStoryComments(s.id);
        }

        async function deleteCurrentStory() {
            if (!currentStoryId) return;
            if (!confirm("ERASE THIS STORY PERMANENTLY?")) return;
            
            const { error } = await sb.from('stories').delete().eq('id', currentStoryId);
            if (error) {
                alert("Delete failed: " + error.message);
            } else {
                alert("STORY DELETED!");
                // Refresh local data and move to next story or close
                await loadStories();
                if (userStoriesGroup.length > 1) {
                    // Remove from local group array
                    userStoriesGroup.splice(currentStoryIndex, 1);
                    if (currentStoryIndex >= userStoriesGroup.length) currentStoryIndex = userStoriesGroup.length - 1;
                    displayCurrentStory();
                } else {
                    closeStoryViewer();
                }
            }
        }

        }
        function toggleStoryMute() {

        }
        function nextStory() {
            if (currentStoryIndex < userStoriesGroup.length - 1) {
                currentStoryIndex++;
                displayCurrentStory();
            } else if (currentGroupIndex < allStoryGroups.length - 1) {
                currentGroupIndex++;
                currentStoryIndex = 0;
                userStoriesGroup = groupedStories[allStoryGroups[currentGroupIndex]];
                displayCurrentStory();
            } else {
                closeStoryViewer();
            }
        }
        function prevStory() {
            if (currentStoryIndex > 0) {
                currentStoryIndex--;
                displayCurrentStory();
            } else if (currentGroupIndex > 0) {
                currentGroupIndex--;
                userStoriesGroup = groupedStories[allStoryGroups[currentGroupIndex]];
                currentStoryIndex = userStoriesGroup.length - 1;
                displayCurrentStory();
            }
        }

        async function postStoryComment() {
            const input = document.getElementById('story-comment-input');
            const val = input.value.trim();
            if (!val || !currentStoryId) return;
            
            // Logic Core: Feedback Protocol
            const originalPlaceholder = input.placeholder;
            input.disabled = true;
            input.placeholder = "SENDING...";

            try {
                const { error } = await sb.from('story_comments').insert([{ 
                    story_id: currentStoryId, 
                    rider_name: profile.name, 
                    text: val 
                }]);
                
                if (error) throw error;

                // Logic Core: Trigger In-App Notification
                const storyOwner = userStoriesGroup[currentStoryIndex].rider_name;
                if (storyOwner !== profile.name) {
                    await sb.from('notifications').insert([{
                        receiver_name: storyOwner,
                        sender_name: profile.name,
                        message: `replied to your story: "${val.substring(0, 20)}${val.length > 20 ? '...' : ''}"`,
                        type: 'story_comment',
                        target_id: currentStoryId
                    }]);
                }

                input.value = '';
                input.placeholder = "REPLY SENT!";
                setTimeout(() => {
                    input.placeholder = originalPlaceholder;
                    input.disabled = false;
                    input.focus();
                }, 1500);

                await loadStoryComments(currentStoryId);
            } catch (err) {
                console.error("Story Comment Error:", err);
                input.placeholder = "FAILED TO SEND";
                input.disabled = false;
                setTimeout(() => { input.placeholder = originalPlaceholder; }, 3000);
            }
        }

        function focusPostArea() { document.getElementById('post-input-header').classList.add('hidden'); document.getElementById('post-expanded').classList.remove('hidden'); document.getElementById('post-content-main').focus(); }
        function closePostArea() { document.getElementById('post-input-header').classList.remove('hidden'); document.getElementById('post-expanded').classList.add('hidden'); }
        function openPostExtra(type) {
            const body = document.getElementById('extra-modal-body'); document.getElementById('post-extra-modal').classList.remove('hidden');
            if (type === 'feeling') { body.innerHTML = '<div class="feeling-grid">' + [{n:'Happy',e:'😊'},{n:'Riding',e:'🏍️'},{n:'Cool',e:'😎'},{n:'Loved',e:'❤️'}].map(f => `<div class="feeling-item" onclick="setPostExtra('feeling', '${f.e} ${f.n}')">${f.e} ${f.n}</div>`).join('') + '</div>'; }
            else if (type === 'location') { body.innerHTML = '<input type="text" id="loc-in" class="input-dark" placeholder="Where?"><button class="btn-neon" onclick="setPostExtra(\'location\', document.getElementById(\'loc-in\').value)">SET</button>'; }
        }
        function setPostExtra(t, v) { if(t==='feeling') selectedFeeling=v; if(t==='location') selectedLocation=v; document.getElementById('post-extras-preview').innerText = (selectedFeeling ? ' — feeling '+selectedFeeling : '') + (selectedLocation ? ' at '+selectedLocation : ''); closePostExtra(); }
        function closePostExtra() { document.getElementById('post-extra-modal').classList.add('hidden'); }
        async function createPostMain() {
            const t = document.getElementById('post-content-main').value.trim(), f = document.getElementById('post-file-main').files[0];
            if(!t && !f) return; let url = null;
            if(f) { const path = `posts/${Date.now()}_${f.name}`; await sb.storage.from('rides').upload(path, f); url = (sb.storage.from('rides').getPublicUrl(path)).data.publicUrl; }
            await sb.from('posts').insert([{ rider_name: profile.name, content: t + '|||' + (selectedFeeling || 'none') + '|||' + (selectedLocation || 'none'), image_url: url }]);
            closePostArea(); loadFeed();
        }
        function openMediaViewer(u) { const modal = document.getElementById('media-viewer-modal'); document.getElementById('media-viewer-content').innerHTML = u.match(/\.(mp4|webm|mov)$/i) ? `<video src="${u}" autoplay loop controls style="max-width:100%; max-height:90vh;"></video>` : `<img src="${u}" style="max-width:100%; max-height:90vh;">`; modal.classList.remove('hidden'); }
        function closeMediaViewer() { document.getElementById('media-viewer-modal').classList.add('hidden'); }
        function previewPostFile(input) { const file = input.files[0]; if (file) { const reader = new FileReader(); reader.onload = (e) => { document.getElementById('post-preview-area').innerHTML = `<img src="${e.target.result}" style="width:100%; border-radius:10px; max-height:300px; object-fit:cover;">`; }; reader.readAsDataURL(file); } }

        window.addEventListener('load', () => { const check = setInterval(() => { if (profile) { clearInterval(check); document.getElementById('user-first-name').innerText = profile.name; document.getElementById('post-avatar').outerHTML = getAvatarHTML(profile.name, profile.avatar_url, "id='post-avatar' style='width:40px; height:40px;'"); if (profile.avatar_url) document.getElementById('my-story-avatar').src = profile.avatar_url; loadFeed(); loadStories(); initFeedRealtime(); switchTab('community'); } }, 500); });

        async function showCommentsModal(postId) {
            const modal = document.getElementById('comments-modal');
            const list = document.getElementById('comments-modal-list');
            modal.classList.remove('hidden');
            list.innerHTML = '<div style="text-align:center; padding:20px;"><i class="fas fa-spinner fa-spin"></i></div>';
            
            const { data: cmts, error } = await sb.from('post_comments').select('*').eq('post_id', postId).order('created_at', { ascending: false });
            if (error) { alert("Error loading comments"); return; }
            
            list.innerHTML = '';
            if (cmts.length === 0) { list.innerHTML = '<div style="text-align:center; padding:20px; color:#444;">No comments yet.</div>'; return; }
            
            for (const c of cmts) {
                const { data: r } = await sb.from('riders').select('id, avatar_url, rank, is_super_admin').eq('name', c.rider_name).single();
                const div = document.createElement('div');
                div.className = 'reactor-item';
                div.onclick = () => { window.location.href = `profile.html?id=${r?.id}`; };
                div.innerHTML = `
                    ${getAvatarHTML(c.rider_name, r?.avatar_url, "style='width:35px; height:35px;'")}
                    <div class="reactor-info">
                        <span class="reactor-name">${c.rider_name}</span>
                        <span class="reactor-rank">${c.text}</span>
                        <div style="font-size:0.6rem; color:#444;">${new Date(c.created_at).toLocaleString()}</div>
                    </div>
                    <div class="reactor-action"><i class="fas fa-chevron-right"></i></div>
                `;
                list.appendChild(div);
            }
        }
        function closeCommentsModal() { document.getElementById('comments-modal').classList.add('hidden'); }
    </script>
</body>
</html>
